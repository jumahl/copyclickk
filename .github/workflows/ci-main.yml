name: CI Main

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-package:
    name: Build, Test & Package
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
      CTEST_OUTPUT_ON_FAILURE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            g++ \
            ccache \
            libsqlite3-dev \
            qt6-base-dev

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-main-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            ccache-main-${{ runner.os }}-

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCOPYCLICKK_BUILD_QT_TRAY_APP=ON \
            -DCOPYCLICKK_BUILD_KDE_COMPONENTS=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Verbose test diagnostics on failure
        if: failure()
        continue-on-error: true
        run: |
          ctest --test-dir build -VV -R copyclickk_ui_tests --output-on-failure || true
          if [ -f build/Testing/Temporary/LastTest.log ]; then
            echo "--- build/Testing/Temporary/LastTest.log ---"
            cat build/Testing/Temporary/LastTest.log
          fi
          if [ -x build/tests/copyclickk_ui_tests ]; then
            echo "--- direct run: build/tests/copyclickk_ui_tests ---"
            build/tests/copyclickk_ui_tests || true
          fi

      - name: Upload CTest logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-main-${{ github.run_id }}
          path: build/Testing/Temporary/
          if-no-files-found: warn
          retention-days: 7

      - name: Prepare package
        run: |
          mkdir -p dist/copyclickk
          cp build/src/uiqt/copyclickk_tray dist/copyclickk/
          cp -r assets dist/copyclickk/
          tar -C dist -czf copyclickk-${{ github.sha }}-linux-x64.tar.gz copyclickk
          sha256sum copyclickk-${{ github.sha }}-linux-x64.tar.gz > copyclickk-${{ github.sha }}-linux-x64.tar.gz.sha256

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: copyclickk-linux-x64-${{ github.sha }}
          path: |
            copyclickk-${{ github.sha }}-linux-x64.tar.gz
            copyclickk-${{ github.sha }}-linux-x64.tar.gz.sha256
          retention-days: 14
