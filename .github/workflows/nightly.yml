name: Nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix-build-test:
    name: Nightly Matrix (${{ matrix.name }})
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
      CTEST_OUTPUT_ON_FAILURE: 1

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: tray-on
            qt_tray: ON
            kde_components: OFF
            experimental: false
          - name: tray-off
            qt_tray: OFF
            kde_components: OFF
            experimental: false
          - name: kde-components-experimental
            qt_tray: ON
            kde_components: ON
            experimental: true

    continue-on-error: ${{ matrix.experimental }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            g++ \
            libsqlite3-dev \
            qt6-base-dev

      # KDE components are optional and can be unavailable depending on runner image state.
      - name: Try install optional KDE dependencies
        if: matrix.kde_components == 'ON'
        run: |
          sudo apt-get install -y libkf6globalaccel-dev || true

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCOPYCLICKK_BUILD_QT_TRAY_APP=${{ matrix.qt_tray }} \
            -DCOPYCLICKK_BUILD_KDE_COMPONENTS=${{ matrix.kde_components }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Verbose test diagnostics on failure
        if: failure()
        continue-on-error: true
        run: |
          ctest --test-dir build -VV -R copyclickk_ui_tests --output-on-failure || true
          if [ -f build/Testing/Temporary/LastTest.log ]; then
            echo "--- build/Testing/Temporary/LastTest.log ---"
            cat build/Testing/Temporary/LastTest.log
          fi
          if [ -x build/tests/copyclickk_ui_tests ]; then
            echo "--- direct run: build/tests/copyclickk_ui_tests ---"
            build/tests/copyclickk_ui_tests || true
          fi

      - name: Upload CTest logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-nightly-${{ matrix.name }}-${{ github.run_id }}
          path: build/Testing/Temporary/
          if-no-files-found: warn
          retention-days: 7
